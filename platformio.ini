; BattleBang ESP32 main firmware
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps = fastled/FastLED@^3.7.0
build_src_filter =
  +<main.cpp>
  -<turret_demo.cpp>
  -<turret_demo_v2_mod.cpp>
  -<turret/main.cpp>

; Turret firmware with build-time injected config
; Override TURRET_* macros via build_flags or by editing src/turret/build_config.h
[env:esp32dev_turret]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  madhephaestus/ESP32Servo@^3.0.6
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5

build_src_filter =
  +<turret/main.cpp>
  -<main.cpp>
  -<turret_demo.cpp>
  -<turret_demo_v2_mod.cpp>

; Example:
; build_flags =
;   -DTURRET_ID='"turret_3"'
;   -DTURRET_X_CM=-170.0f
;   -DTURRET_Y_CM=190.0f
;   -DTURRET_Z_CM=134.5f
;   -DTURRET_DEFAULT_TARGET_Z_CM=70.0f
;   -DTURRET_WIFI_SSID='"your-ssid"'
;   -DTURRET_WIFI_PASSWORD='"your-password"'
;   -DTURRET_MQTT_HOST='"192.168.0.10"'
;   -DTURRET_MQTT_PORT=1883
;   -DTURRET_MQTT_COORDS_IN_METERS=1
;   -DTURRET_AUTO_FIRE_ON_TARGET=1

[env:esp32dev_turret_1]
extends = env:esp32dev_turret
build_flags =
  -include src/turret/presets/turret_1.h

[env:esp32dev_turret_2]
extends = env:esp32dev_turret
build_flags =
  -include src/turret/presets/turret_2.h

[env:esp32dev_turret_3]
extends = env:esp32dev_turret
build_flags =
  -include src/turret/presets/turret_3.h

[env:esp32dev_turret_4]
extends = env:esp32dev_turret
build_flags =
  -include src/turret/presets/turret_4.h

[env:esp32dev_turret_5]
extends = env:esp32dev_turret
build_flags =
  -include src/turret/presets/turret_5.h

[env:esp32dev_turret_6]
extends = env:esp32dev_turret
build_flags =
  -include src/turret/presets/turret_6.h

; 네이티브 단위 테스트 (호스트 PC에서 실행, main.cpp 제외)
[env:native]
platform = native
build_src = no
test_framework = googletest
lib_ignore = FastLED
