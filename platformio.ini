; BattleBang ESP32 firmware – 한 번 빌드, 한 번 업로드
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps = fastled/FastLED@^3.7.0

; 네이티브 단위 테스트 (호스트 PC에서 실행, main.cpp 제외)
[env:native]
platform = native
build_src = no
test_framework = googletest
lib_ignore = FastLED
