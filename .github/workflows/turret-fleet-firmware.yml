name: Turret Fleet Firmware

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/turret-fleet-firmware.yml"
      - "platformio.ini"
      - "src/turret_fleet/**"
      - "scripts/turret_fleet/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Firmware version label for the artifact"
        required: true
        default: "0.1.0-manual"
      build:
        description: "Numeric firmware build. Must increase for OTA version checks."
        required: true
        default: "1"
      firmware_base_url:
        description: "Optional HTTP base URL reachable by ESP32 devices, e.g. http://COMMAND_CENTER_IP_OR_DNS:8080/firmware"
        required: false
        default: ""
      public_release_repo:
        description: "Public repository that hosts firmware releases. Same-repo releases use GITHUB_TOKEN; cross-repo releases need PUBLIC_RELEASE_REPO_TOKEN."
        required: true
        default: "KongPedia/battlebang-esp"
      public_release_target_branch:
        description: "Target branch in the public release repository used when creating a new release tag"
        required: true
        default: "main"
      create_release:
        description: "Create/update a Release in the public firmware repository"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Derive firmware version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            BUILD="${{ inputs.build }}"
            FIRMWARE_BASE_URL="${{ inputs.firmware_base_url }}"
            PUBLIC_REPO="${{ inputs.public_release_repo }}"
            TARGET_BRANCH="${{ inputs.public_release_target_branch }}"
            CREATE_RELEASE="${{ inputs.create_release }}"
          else
            VERSION="0.1.${GITHUB_RUN_NUMBER}-main"
            BUILD="${GITHUB_RUN_NUMBER}"
            FIRMWARE_BASE_URL=""
            PUBLIC_REPO="${GITHUB_REPOSITORY}"
            TARGET_BRANCH="${GITHUB_REF_NAME}"
            CREATE_RELEASE="true"
          fi

          if ! [[ "${BUILD}" =~ ^[0-9]+$ ]]; then
            echo "build must be numeric, got: ${BUILD}" >&2
            exit 2
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "firmware_base_url=${FIRMWARE_BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "public_release_repo=${PUBLIC_REPO}" >> "$GITHUB_OUTPUT"
          echo "public_release_target_branch=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "create_release=${CREATE_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Generate firmware version header
        shell: bash
        run: |
          cat > src/turret_fleet/app/version_autogen.h <<EOF_VERSION
          #pragma once
          #define BB_TURRET_FLEET_VERSION "${{ steps.version.outputs.version }}"
          #define BB_TURRET_FLEET_BUILD ${{ steps.version.outputs.build }}
          #define BB_TURRET_FLEET_GIT_SHA "${GITHUB_SHA}"
          EOF_VERSION

      - name: Build firmware
        run: pio run -e esp32dev_turret_fleet

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          FIRMWARE_NAME="battlebang-turret-fleet-${{ steps.version.outputs.version }}.bin"
          BASE_URL="${{ steps.version.outputs.firmware_base_url }}"
          PUBLIC_REPO="${{ steps.version.outputs.public_release_repo }}"
          if [[ -n "${BASE_URL}" ]]; then
            FIRMWARE_URL="${BASE_URL%/}/${FIRMWARE_NAME}"
          elif [[ "${{ steps.version.outputs.create_release }}" == "true" ]]; then
            FIRMWARE_URL="https://github.com/${PUBLIC_REPO}/releases/download/turret-fleet-v${{ steps.version.outputs.version }}/${FIRMWARE_NAME}"
          else
            FIRMWARE_URL=""
          fi
          cp .pio/build/esp32dev_turret_fleet/firmware.bin "dist/${FIRMWARE_NAME}"
          shasum -a 256 "dist/${FIRMWARE_NAME}" > dist/sha256.txt
          python scripts/turret_fleet/make_release_manifest.py \
            --firmware "dist/${FIRMWARE_NAME}" \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ steps.version.outputs.build }}" \
            --url "${FIRMWARE_URL}" \
            --output dist/manifest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: turret-fleet-firmware-${{ steps.version.outputs.version }}
          path: dist/*

      - name: Create GitHub Release for tag
        if: steps.version.outputs.create_release == 'true'
        env:
          DEFAULT_GITHUB_TOKEN: ${{ github.token }}
          PUBLIC_RELEASE_REPO_TOKEN: ${{ secrets.PUBLIC_RELEASE_REPO_TOKEN }}
        run: |
          TAG="turret-fleet-v${{ steps.version.outputs.version }}"
          PUBLIC_REPO="${{ steps.version.outputs.public_release_repo }}"
          TARGET_BRANCH="${{ steps.version.outputs.public_release_target_branch }}"
          if [[ "${PUBLIC_REPO}" == "${GITHUB_REPOSITORY}" ]]; then
            export GH_TOKEN="${DEFAULT_GITHUB_TOKEN}"
          else
            export GH_TOKEN="${PUBLIC_RELEASE_REPO_TOKEN}"
            if [[ -z "${GH_TOKEN}" ]]; then
              echo "Cross-repo release to ${PUBLIC_REPO} requires repository secret PUBLIC_RELEASE_REPO_TOKEN." >&2
              echo "Same-repo public releases to ${GITHUB_REPOSITORY} use the built-in GITHUB_TOKEN." >&2
              exit 2
            fi
          fi

          if [[ -z "${GH_TOKEN}" ]]; then
            echo "Missing GitHub token." >&2
            exit 2
          fi

          if gh release view "${TAG}" -R "${PUBLIC_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* -R "${PUBLIC_REPO}" --clobber
          else
            gh release create "${TAG}" dist/* \
              -R "${PUBLIC_REPO}" \
              --target "${TARGET_BRANCH}" \
              --title "${TAG}" \
              --notes "BattleBang turret fleet firmware built from private source commit ${GITHUB_SHA}."
          fi
