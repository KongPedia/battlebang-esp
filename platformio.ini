[platformio]
default_envs = esp32dev_turret_5

; BattleBang Go2 hit ESP firmware.
; Per-robot profiles come from src/go2/robots.json.
; Local Wi-Fi/MQTT secrets come from gitignored src/go2/local_secrets.h
; or env vars read by scripts/go2_config.py.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

lib_deps =
  fastled/FastLED@^3.7.0
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5

extra_scripts =
  pre:scripts/go2_config.py

build_src_filter =
  +<go2/**>
  -<turret/**>
  -<turret_fleet/**>
  -<test.cpp>
  -<turret_demo.cpp>
  -<turret_demo_v2_mod.cpp>

[env:esp32dev_go2]
extends = env:esp32dev

[env:esp32dev_go2_03]
extends = env:esp32dev
custom_robot_id = go2_03

[env:esp32dev_go2_05]
extends = env:esp32dev
custom_robot_id = go2_05

[env:esp32dev_go2_06]
extends = env:esp32dev
custom_robot_id = go2_06

[env:esp32dev_go2_07]
extends = env:esp32dev
custom_robot_id = go2_07

[env:esp32dev_nixo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

lib_deps =
  fastled/FastLED@^3.7.0
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5
extra_scripts =
  pre:scripts/nixo_config.py
build_src_filter =
  +<nIxo/main.cpp>
  -<go2/**>
  -<main.cpp>
  -<nIxo/BluetoothSerial.cpp>
  -<turret_demo.cpp>
  -<turret_demo_v2_mod.cpp>
  -<turret/main.cpp>
  -<turret/main_turret.cpp>

; MQTT turret firmware.
; Per-turret install coordinates come from src/turret/turrets.json.
; Local Wi-Fi/MQTT secrets come from gitignored src/turret/local_secrets.h or env vars read by scripts/turret_config.py.
[env:esp32dev_turret]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  madhephaestus/ESP32Servo@^3.0.6
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5

extra_scripts =
  pre:scripts/turret_config.py

build_src_filter =
  +<turret/main.cpp>
  -<go2/**>
  -<turret/main_turret.cpp>
  -<turret_demo.cpp>
  -<turret_demo_v2_mod.cpp>
  -<turret_wifi_probe.cpp>
  -<turret_legacy_mqtt_probe.cpp>

[env:esp32dev_turret_1]
extends = env:esp32dev_turret
custom_turret_id = turret_1

[env:esp32dev_turret_2]
extends = env:esp32dev_turret
custom_turret_id = turret_2

[env:esp32dev_turret_3]
extends = env:esp32dev_turret
custom_turret_id = turret_3

[env:esp32dev_turret_4]
extends = env:esp32dev_turret
custom_turret_id = turret_4

[env:esp32dev_turret_5]
extends = env:esp32dev_turret
custom_turret_id = turret_5

[env:esp32dev_turret_6]
extends = env:esp32dev_turret
custom_turret_id = turret_6

; Future fleet firmware path.
; This does not replace src/turret/ yet. It builds a generic firmware that reads
; turret identity/coordinates from runtime config stored in ESP32 NVS.
[env:esp32dev_turret_fleet]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5

build_src_filter =
  +<turret_fleet/>
  -<go2/**>
  -<turret/main.cpp>
  -<turret/main_turret.cpp>
  -<turret_demo.cpp>
  -<turret_demo_v2_mod.cpp>

; Native unit tests (host PC; ESP32 firmware sources excluded)
[env:native]
platform = native
build_src_filter = -<*>
test_framework = googletest
lib_ignore = FastLED
